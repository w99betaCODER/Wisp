<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wisp — VPN panel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌫️</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">🌫️</span> Wisp</div>
    <div class="sub">single-binary · multi-node · Xray VPN panel</div>
  </header>

  <main>
    <!-- Stats strip -->
    <section class="stats" id="stats"></section>

    <!-- Users -->
    <section class="card">
      <div class="card-head">
        <h2>Users</h2>
        <button class="btn" onclick="toggle('user-form')">+ Add user</button>
      </div>

      <form id="user-form" class="form hidden" onsubmit="createUser(event)">
        <input name="email" placeholder="email (e.g. alice@vpn)" required />
        <input name="limit_gb" type="number" min="0" step="0.1" placeholder="limit, GB (0 = ∞)" />
        <input name="expires" type="date" title="expiry date (optional)" />
        <button class="btn primary" type="submit">Create</button>
      </form>

      <div class="table-wrap">
        <table id="users">
          <thead>
            <tr>
              <th>Email</th><th>Status</th><th>Traffic</th><th>Expires</th><th>UUID</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <p class="empty" id="users-empty">No users yet.</p>
      </div>
    </section>

    <!-- Nodes -->
    <section class="card">
      <div class="card-head">
        <h2>Nodes</h2>
        <button class="btn" onclick="toggle('node-form')">+ Add node</button>
      </div>

      <form id="node-form" class="form hidden" onsubmit="createNode(event)">
        <input name="name" placeholder="name (e.g. nl-amsterdam-1)" required />
        <input name="address" placeholder="agent address (host:port)" required />
        <button class="btn primary" type="submit">Register</button>
      </form>

      <div class="table-wrap">
        <table id="nodes">
          <thead>
            <tr><th>Name</th><th>Address</th><th>Status</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <p class="empty" id="nodes-empty">No nodes — the panel uses its local Xray.</p>
      </div>
    </section>
  </main>

  <footer>Wisp · <a href="https://github.com/w99betaCODER/Wisp" target="_blank" rel="noopener">github.com/w99betaCODER/Wisp</a></footer>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
