name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build static binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          suffix="${{ matrix.goos }}-${{ matrix.goarch }}"
          for cmd in panel node wisp-certs; do
            go build -ldflags "-s -w" -o "dist/wisp-${cmd}-${suffix}" "./cmd/${cmd}"
          done

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
